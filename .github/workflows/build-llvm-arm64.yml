name: Build Native ARM64 LLVM/Clang Toolchain

on:
  workflow_dispatch:
    inputs:
      llvm_version:
        description: "LLVM version tag"
        required: false
        default: "llvmorg-22.1.7"
      build_type:
        description: "Build type"
        required: false
        type: choice
        options:
          - Release
          - RelWithDebInfo
        default: "Release"
      runner:
        description: "Runner size (larger = faster, requires paid plan)"
        required: false
        type: choice
        options:
          - ubuntu-24.04
          - ubuntu-24.04-8core
          - ubuntu-24.04-16core
        default: "ubuntu-24.04"
      enable_lto:
        description: "Clang ThinLTO (-flto=thin)"
        required: false
        type: boolean
        default: true
      enable_pgo:
        description: "PGO (2-stage, experimental)"
        required: false
        type: boolean
        default: false
      enable_bolt:
        description: "Enable BOLT optimization (reserved for future)"
        required: false
        type: boolean
        default: false
      quick_test:
        description: "Quick test only (CMake + compile 1 file, skip full build)"
        required: false
        type: boolean
        default: false
      upload_artifact:
        description: "Upload build artifact"
        required: false
        type: boolean
        default: true

concurrency:
  group: native-arm64-build
  cancel-in-progress: true

env:
  LLVM_VERSION: ${{ github.event.inputs.llvm_version || 'llvmorg-22.1.7' }}
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}
  ARTIFACT_NAME: llvm-clang-arm64-native

jobs:
  build-llvm:
    name: "Build LLVM ${{ inputs.llvm_version || 'llvmorg-22.1.7' }} (Native ARM64)"
    runs-on: ${{ inputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup ARM64 cross-build environment
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ninja-build cmake ccache python3 flex bison pkg-config xz-utils \
            clang lld llvm-18-tools binutils-aarch64-linux-gnu \
            libc6-dev-arm64-cross libc6-arm64-cross libstdc++-14-dev-arm64-cross libgcc-14-dev-arm64-cross \
            linux-libc-dev-arm64-cross qemu-user-static

          # Fix ARM64 sysroot libc.so linker script for LLD compatibility
          # The default script references multiarch paths that LLD can't resolve
          SYSROOT=/usr/aarch64-linux-gnu
          sudo mkdir -p "$SYSROOT/lib/aarch64-linux-gnu"
          sudo mkdir -p "$SYSROOT/usr/lib/aarch64-linux-gnu"
          # /lib/aarch64-linux-gnu/libc.so.6 -> ../libc.so.6
          sudo ln -sf ../libc.so.6 "$SYSROOT/lib/aarch64-linux-gnu/libc.so.6"
          # /usr/lib/aarch64-linux-gnu/libc_nonshared.a -> ../../../lib/libc_nonshared.a
          sudo ln -sf ../../../lib/libc_nonshared.a "$SYSROOT/usr/lib/aarch64-linux-gnu/libc_nonshared.a"

          sudo mkdir -p /ccache && sudo chown "$(id -u):$(id -g)" /ccache
          ccache --set-config=max_size=20G -z
          echo "CCACHE_DIR=/ccache" >> "$GITHUB_ENV"
          echo "PROFILE_DIR=$GITHUB_WORKSPACE/pgo-profiles" >> "$GITHUB_ENV"

      - name: Restore ccache
        uses: actions/cache/restore@v4
        id: ccache-restore
        with:
          path: /ccache
          key: ccache-arm64-native-${{ env.LLVM_VERSION }}-${{ github.run_id }}
          restore-keys: ccache-arm64-native-${{ env.LLVM_VERSION }}-

      # ==========================================================
      # Restore cached Stage 1 (skip rebuild if available)
      # ==========================================================
      - name: Restore Stage 1 cache
        uses: actions/cache/restore@v4
        id: stage1-cache
        with:
          path: ${{ github.workspace }}/stage1-install
          key: stage1-arm64-${{ env.LLVM_VERSION }}-${{ hashFiles('.github/workflows/build-llvm-arm64.yml') }}

      - name: Set Stage 1 path (cached)
        if: ${{ steps.stage1-cache.outputs.cache-hit == 'true' }}
        run: |
          echo "STAGE1_INSTALL=$GITHUB_WORKSPACE/stage1-install" >> "$GITHUB_ENV"
          echo "=== Using cached Stage 1 ==="

      - name: Clone LLVM project
        run: |
          git clone --depth 1 --branch "$LLVM_VERSION" https://github.com/llvm/llvm-project.git "$GITHUB_WORKSPACE/llvm-project"
          cd "$GITHUB_WORKSPACE/llvm-project"
          echo "LLVM_SOURCE_DIR=$PWD" >> "$GITHUB_ENV"

      # ==========================================================
      # Bootstrap: build ARM64 profiling runtime for PGO support
      # ==========================================================
      - name: "Bootstrap ARM64 profiling runtime"
        if: ${{ inputs.enable_pgo && steps.stage1-cache.outputs.cache-hit != 'true' }}
        run: |
          set -euo pipefail
          echo "=== Bootstrapping ARM64 compiler-rt profile library ==="
          RT_DIR="$GITHUB_WORKSPACE/build-rt"
          cmake -S "$LLVM_SOURCE_DIR/compiler-rt" -B "$RT_DIR" -G Ninja -Wno-dev \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_C_COMPILER_TARGET=aarch64-linux-gnu \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_COMPILER_TARGET=aarch64-linux-gnu \
            -DCMAKE_SYSROOT=/usr/aarch64-linux-gnu \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCOMPILER_RT_DEFAULT_TARGET_ONLY=ON \
            -DCOMPILER_RT_BUILD_PROFILE=ON \
            -DCOMPILER_RT_BUILD_BUILTINS=OFF \
            -DCOMPILER_RT_BUILD_SANITIZERS=OFF \
            -DCOMPILER_RT_BUILD_XRAY=OFF \
            -DCOMPILER_RT_BUILD_LIBFUZZER=OFF \
            -DCOMPILER_RT_BUILD_ORC=OFF \
            -DCOMPILER_RT_BUILD_SCUDO_STANDALONE=OFF \
            -DCOMPILER_RT_BUILD_GWP_ASAN=OFF \
            -DCOMPILER_RT_BUILD_MEMPROF=OFF
          ninja -C "$RT_DIR" clang_rt.profile-aarch64
          # Install to system Clang resource directory
          CLANG_RES="$(clang -print-resource-dir)"
          sudo mkdir -p "$CLANG_RES/lib/linux"
          sudo cp "$RT_DIR/lib/linux/libclang_rt.profile-aarch64.a" "$CLANG_RES/lib/linux/"
          echo "=== ARM64 profiling runtime ready ==="

      # ==========================================================
      # STAGE 1: Instrumented build (for PGO) or Normal build
      # ==========================================================
      - name: "Stage 1: Configure"
        if: ${{ steps.stage1-cache.outputs.cache-hit != 'true' }}
        run: |
          set -euo pipefail
          STAGE1_DIR="$GITHUB_WORKSPACE/stage1"
          STAGE1_INSTALL="$GITHUB_WORKSPACE/stage1-install"
          mkdir -p "$STAGE1_DIR" "$STAGE1_INSTALL"
          echo "STAGE1_DIR=$STAGE1_DIR" >> "$GITHUB_ENV"
          echo "STAGE1_INSTALL=$STAGE1_INSTALL" >> "$GITHUB_ENV"

          BASE_CFLAGS="-O3 -march=armv8.2-a+crc+crypto+fp16+rcpc+dotprod -fomit-frame-pointer -ffunction-sections -fdata-sections -fno-plt -fmerge-all-constants"
          [ "${{ inputs.enable_lto }}" = "true" ] && BASE_CFLAGS="$BASE_CFLAGS -flto=thin"
          BASE_LDFLAGS="-fuse-ld=lld -Wl,-O3 -Wl,--gc-sections -Wl,--as-needed -Wl,--icf=all"
          [ "${{ inputs.enable_lto }}" = "true" ] && BASE_LDFLAGS="$BASE_LDFLAGS -Wl,--thinlto-cache-dir=$GITHUB_WORKSPACE/thinlto-cache"

          if [ "${{ inputs.enable_pgo }}" = "true" ]; then
            PGO_DIR="$GITHUB_WORKSPACE/pgo-profiles"
            mkdir -p "$PGO_DIR"
            PGO_CFLAGS="-fprofile-generate=$PGO_DIR"
          else
            PGO_CFLAGS=""
          fi

          echo "BASE_CFLAGS=$BASE_CFLAGS" >> "$GITHUB_ENV"
          echo "PGO_CFLAGS=$PGO_CFLAGS" >> "$GITHUB_ENV"

          cmake -S "$LLVM_SOURCE_DIR/llvm" -B "$STAGE1_DIR" -G "Ninja" -Wno-dev \
            -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_CROSSCOMPILING=ON \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER_TARGET=aarch64-linux-gnu \
            -DCMAKE_CXX_COMPILER_TARGET=aarch64-linux-gnu \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS_RELEASE="$BASE_CFLAGS $PGO_CFLAGS" \
            -DCMAKE_CXX_FLAGS_RELEASE="$BASE_CFLAGS $PGO_CFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="$BASE_LDFLAGS" \
            -DCMAKE_SHARED_LINKER_FLAGS="$BASE_LDFLAGS" \
            -DCMAKE_INSTALL_PREFIX="$STAGE1_INSTALL" \
            -DLLVM_HOST_TRIPLE=aarch64-linux-gnu \
            -DLLVM_DEFAULT_TARGET_TRIPLE=aarch64-linux-gnu \
            -DLLVM_TARGETS_TO_BUILD="AArch64;ARM" \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_OPTIMIZED_TABLEGEN=ON \
            -DLLVM_ENABLE_PIC=ON -DLLVM_ENABLE_ZSTD=ON -DLLVM_ENABLE_ZLIB=ON \
            -DLLVM_PARALLEL_COMPILE_JOBS="$(nproc)" -DLLVM_PARALLEL_LINK_JOBS="$(nproc)" \
            -DLLVM_BUILD_LLVM_DYLIB=ON -DLLVM_LINK_LLVM_DYLIB=ON \
            -DLLVM_INCLUDE_TESTS=OFF -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_ENABLE_BINDINGS=OFF -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DLLVM_ENABLE_LIBXML2=OFF

      # ==========================================================
      # Quick test: compile 1 file to validate optimization flags
      # ==========================================================
      - name: "Quick Test: verify optimization flags"
        if: ${{ inputs.quick_test }}
        run: |
          set -euo pipefail
          cd "$STAGE1_DIR"
          echo "=== Testing with: $BASE_CFLAGS $PGO_CFLAGS ==="
          TARGET=$(ninja -t targets all 2>/dev/null | grep -m1 "\.cpp\.o" | awk -F: '{print $1}')
          if [ -z "$TARGET" ]; then
            TARGET=$(ninja -t targets all 2>/dev/null | grep -m1 "\.c\.o" | awk -F: '{print $1}')
          fi
          ninja -j1 "$TARGET" 2>&1 | tail -20
          echo "=== QUICK TEST PASSED ==="

      - name: "Stage 1: Build"
        if: ${{ !inputs.quick_test && steps.stage1-cache.outputs.cache-hit != 'true' }}
        run: |
          cd "$STAGE1_DIR"
          ninja -j"$(nproc)" clang lld llvm-ar llvm-nm llvm-objcopy llvm-objdump \
            llvm-ranlib llvm-readelf llvm-size llvm-strings llvm-strip

      - name: "Stage 1: Install"
        if: ${{ !inputs.quick_test && steps.stage1-cache.outputs.cache-hit != 'true' }}
        run: |
          cd "$STAGE1_DIR"
          ninja install
          echo "Stage 1 done"

      - name: Save Stage 1 cache
        if: ${{ !inputs.quick_test && steps.stage1-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/stage1-install
          key: stage1-arm64-${{ env.LLVM_VERSION }}-${{ hashFiles('.github/workflows/build-llvm-arm64.yml') }}

      # ==========================================================
      # PGO Training: run instrumented Clang via QEMU
      # ==========================================================
      - name: "PGO Training (QEMU)"
        if: ${{ inputs.enable_pgo && !inputs.quick_test }}
        run: |
          set -euo pipefail
          PGO_DIR="$GITHUB_WORKSPACE/pgo-profiles"
          mkdir -p "$PGO_DIR"
          cat > /tmp/train.c << 'TRAINEOF'
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          struct Node { int v; struct Node* n; };
          int main(void) {
            int s=0; struct Node *h=NULL, *p;
            for (int i=0;i<100;i++) {
              p=malloc(sizeof(*p)); p->v=i; p->n=h; h=p;
            }
            for (p=h;p;p=p->n) s+=p->v;
            printf("sum=%d\n",s);
            while(h){p=h;h=h->n;free(p);}
            return 0;
          }
          TRAINEOF
          export LLVM_PROFILE_FILE="$PGO_DIR/train_%p.profraw"
          for i in $(seq 1 5); do
            qemu-aarch64-static -L /usr/aarch64-linux-gnu \
              -E LLVM_PROFILE_FILE="$LLVM_PROFILE_FILE" \
              "$STAGE1_INSTALL/bin/clang" -O2 -c /tmp/train.c -o /tmp/train.o
          done
          echo "=== PGO Training done, profiles: ==="
          ls -la "$PGO_DIR/" || true

      - name: "Merge PGO profiles"
        if: ${{ inputs.enable_pgo && !inputs.quick_test }}
        run: |
          PGO_DIR="$GITHUB_WORKSPACE/pgo-profiles"
          shopt -s nullglob
          PROFRAW_FILES=("$PGO_DIR"/*.profraw)
          if [ ${#PROFRAW_FILES[@]} -gt 0 ]; then
            llvm-profdata-18 merge -output="$PGO_DIR/merged.profdata" "${PROFRAW_FILES[@]}"
            echo "PGO_PROFDATA=$PGO_DIR/merged.profdata" >> "$GITHUB_ENV"
            echo "=== PGO profile merged: $(wc -c < "$PGO_DIR/merged.profdata") bytes ==="
          else
            echo "=== WARNING: No .profraw files found, PGO disabled for Stage 2 ==="
            echo "PGO_PROFDATA=" >> "$GITHUB_ENV"
          fi
          ls -la "$PGO_DIR" || true

      # ==========================================================
      # STAGE 2: PGO-optimized build (or skip if PGO off)
      # ==========================================================
      - name: "Stage 2: Configure"
        if: ${{ inputs.enable_pgo && !inputs.quick_test }}
        run: |
          BUILD_DIR="$GITHUB_WORKSPACE/build"
          INSTALL_DIR="$GITHUB_WORKSPACE/install"
          mkdir -p "$BUILD_DIR" "$INSTALL_DIR"
          echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=$INSTALL_DIR" >> "$GITHUB_ENV"

          OPT_CFLAGS="-O3 -march=armv8.2-a+crc+crypto+fp16+rcpc+dotprod -fomit-frame-pointer -ffunction-sections -fdata-sections -fno-plt -fmerge-all-constants"
          [ "${{ inputs.enable_lto }}" = "true" ] && OPT_CFLAGS="$OPT_CFLAGS -flto=thin"
          PGO_PROFDATA="${PGO_PROFDATA:-}"
          OPT_LDFLAGS="-fuse-ld=lld -Wl,-O3 -Wl,--gc-sections -Wl,--as-needed -Wl,--icf=all"
          [ "${{ inputs.enable_lto }}" = "true" ] && OPT_LDFLAGS="$OPT_LDFLAGS -Wl,--thinlto-cache-dir=$GITHUB_WORKSPACE/thinlto-cache"

          if [ -n "$PGO_PROFDATA" ] && [ -f "$PGO_PROFDATA" ]; then
            PGO_USE_FLAGS="-fprofile-use=$PGO_PROFDATA -fprofile-correction"
          else
            PGO_USE_FLAGS=""
          fi

          cmake -S "$LLVM_SOURCE_DIR/llvm" -B "$BUILD_DIR" -G "Ninja" -Wno-dev \
            -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_CROSSCOMPILING=ON \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER_TARGET=aarch64-linux-gnu \
            -DCMAKE_CXX_COMPILER_TARGET=aarch64-linux-gnu \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS_RELEASE="$OPT_CFLAGS $PGO_USE_FLAGS" \
            -DCMAKE_CXX_FLAGS_RELEASE="$OPT_CFLAGS $PGO_USE_FLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="$OPT_LDFLAGS" \
            -DCMAKE_SHARED_LINKER_FLAGS="$OPT_LDFLAGS" \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
            -DLLVM_HOST_TRIPLE=aarch64-linux-gnu \
            -DLLVM_DEFAULT_TARGET_TRIPLE=aarch64-linux-gnu \
            -DLLVM_TARGETS_TO_BUILD="AArch64;ARM" \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_OPTIMIZED_TABLEGEN=ON \
            -DLLVM_ENABLE_PIC=ON -DLLVM_ENABLE_ZSTD=ON -DLLVM_ENABLE_ZLIB=ON \
            -DLLVM_PARALLEL_COMPILE_JOBS="$(nproc)" -DLLVM_PARALLEL_LINK_JOBS="$(nproc)" \
            -DLLVM_BUILD_LLVM_DYLIB=ON -DLLVM_LINK_LLVM_DYLIB=ON \
            -DLLVM_INCLUDE_TESTS=OFF -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_ENABLE_BINDINGS=OFF -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DLLVM_ENABLE_LIBXML2=OFF

      - name: "Stage 2: Build"
        if: ${{ inputs.enable_pgo && !inputs.quick_test }}
        run: |
          cd "$BUILD_DIR"
          ninja -j"$(nproc)" clang lld llvm-ar llvm-nm llvm-objcopy llvm-objdump \
            llvm-ranlib llvm-readelf llvm-size llvm-strings llvm-strip

      - name: "Stage 2: Install"
        if: ${{ inputs.enable_pgo && !inputs.quick_test }}
        run: |
          cd "$BUILD_DIR"
          ninja install
          echo "Stage 2 PGO toolchain ready"

      # ==========================================================
      # Non-PGO path: use Stage 1 directly
      # ==========================================================
      - name: "Use Stage 1 as final"
        if: ${{ !inputs.enable_pgo && !inputs.quick_test }}
        run: |
          echo "BUILD_DIR=$STAGE1_DIR" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=$STAGE1_INSTALL" >> "$GITHUB_ENV"

      # ==========================================================
      # Verify: MUST be ARM64 ELF binaries
      # ==========================================================
      - name: Verify ARM64 ELF binaries
        if: ${{ !inputs.quick_test }}
        run: |
          set -euo pipefail
          echo "=== Binary format verification ==="
          file -L "$INSTALL_DIR/bin/clang" "$INSTALL_DIR/bin/lld" "$INSTALL_DIR/bin/llvm-ar"
          if file -L "$INSTALL_DIR/bin/clang" | grep -q "ARM aarch64"; then
            echo "PASS: clang is native ARM64 ELF binary"
          else
            echo "FAIL: clang is NOT ARM64!"
            exit 1
          fi
          du -sh "$INSTALL_DIR"

      - name: Package toolchain
        id: package
        if: ${{ inputs.upload_artifact && !inputs.quick_test }}
        run: |
          ARCHIVE_NAME="${{ env.ARTIFACT_NAME }}-${{ env.LLVM_VERSION }}"
          ARCHIVE_PATH="$GITHUB_WORKSPACE/${ARCHIVE_NAME}.tar.xz"
          tar -cJf "$ARCHIVE_PATH" -C "$INSTALL_DIR" .
          echo "archive_path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"
          echo "archive_name=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"
          ls -lh "$ARCHIVE_PATH"

      - name: Upload artifact
        if: ${{ inputs.upload_artifact && !inputs.quick_test }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive_name }}
          path: ${{ steps.package.outputs.archive_path }}
          retention-days: 30
          compression-level: 0

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /ccache
          key: ccache-arm64-native-${{ env.LLVM_VERSION }}-${{ github.run_id }}
