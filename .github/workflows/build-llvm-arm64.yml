name: Build Native ARM64 LLVM/Clang Toolchain

on:
  workflow_dispatch:
    inputs:
      llvm_version:
        description: "LLVM version tag"
        required: false
        default: "llvmorg-19.1.7"
      build_type:
        description: "Build type"
        required: false
        type: choice
        options:
          - Release
          - RelWithDebInfo
        default: "Release"
      runner:
        description: "Runner size (larger = faster, requires paid plan)"
        required: false
        type: choice
        options:
          - ubuntu-24.04
          - ubuntu-24.04-8core
          - ubuntu-24.04-16core
        default: "ubuntu-24.04"
      enable_lto:
        description: "Enable ThinLTO"
        required: false
        type: boolean
        default: true
      custom_clang_url:
        description: "URL to pre-built Clang archive (.tar.xz or .tar.gz). Leave empty to use system clang-18"
        required: false
        type: string
        default: ""
      enable_pgo:
        description: "Enable PGO (reserved for future)"
        required: false
        type: boolean
        default: false
      enable_bolt:
        description: "Enable BOLT optimization (reserved for future)"
        required: false
        type: boolean
        default: false
      upload_artifact:
        description: "Upload build artifact"
        required: false
        type: boolean
        default: true

concurrency:
  group: native-arm64-build
  cancel-in-progress: true

env:
  LLVM_VERSION: ${{ github.event.inputs.llvm_version || 'llvmorg-19.1.7' }}
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}
  ARTIFACT_NAME: llvm-clang-arm64-native

jobs:
  build-llvm:
    name: "Build LLVM ${{ inputs.llvm_version || 'llvmorg-19.1.7' }} (Native ARM64)"
    runs-on: ${{ inputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup ARM64 cross-build environment
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ninja-build cmake ccache python3 flex bison pkg-config xz-utils \
            binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross libc6-arm64-cross libstdc++-14-dev-arm64-cross libgcc-14-dev-arm64-cross \
            linux-libc-dev-arm64-cross qemu-user-static
          sudo mkdir -p /ccache && sudo chown "$(id -u):$(id -g)" /ccache
          ccache --set-config=max_size=20G -z
          echo "CCACHE_DIR=/ccache" >> "$GITHUB_ENV"
          echo "PROFILE_DIR=$GITHUB_WORKSPACE/pgo-profiles" >> "$GITHUB_ENV"

      - name: Restore ccache
        uses: actions/cache/restore@v4
        id: ccache-restore
        with:
          path: /ccache
          key: ccache-arm64-native-${{ env.LLVM_VERSION }}-${{ github.run_id }}
          restore-keys: ccache-arm64-native-${{ env.LLVM_VERSION }}-

      - name: Clone LLVM project
        run: |
          git clone --depth 1 --branch "$LLVM_VERSION" https://github.com/llvm/llvm-project.git "$GITHUB_WORKSPACE/llvm-project"
          cd "$GITHUB_WORKSPACE/llvm-project"
          echo "LLVM_SOURCE_DIR=$PWD" >> "$GITHUB_ENV"

      # ==========================================================
      # STAGE 1: Instrumented build (for PGO) or Normal build
      # ==========================================================
      - name: "Stage 1: Configure"
        run: |
          set -euo pipefail
          STAGE1_DIR="$GITHUB_WORKSPACE/stage1"
          STAGE1_INSTALL="$GITHUB_WORKSPACE/stage1-install"
          mkdir -p "$STAGE1_DIR" "$STAGE1_INSTALL"
          echo "STAGE1_DIR=$STAGE1_DIR" >> "$GITHUB_ENV"
          echo "STAGE1_INSTALL=$STAGE1_INSTALL" >> "$GITHUB_ENV"

          BASE_CFLAGS="-O2 -march=armv8-a+crc+crypto -fomit-frame-pointer -ffunction-sections -fdata-sections"
          BASE_LDFLAGS="-Wl,-O3 -Wl,--gc-sections -Wl,--as-needed"

          if [ "${{ inputs.enable_pgo }}" = "true" ]; then
            PGO_DIR="$GITHUB_WORKSPACE/pgo-profiles"
            mkdir -p "$PGO_DIR"
            PGO_CFLAGS="-fprofile-generate=$PGO_DIR"
          else
            PGO_CFLAGS=""
          fi

          cmake -S "$LLVM_SOURCE_DIR/llvm" -B "$STAGE1_DIR" -G "Ninja" -Wno-dev \
            -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_CROSSCOMPILING=ON \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS_RELEASE="$BASE_CFLAGS $PGO_CFLAGS" \
            -DCMAKE_CXX_FLAGS_RELEASE="$BASE_CFLAGS $PGO_CFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="$BASE_LDFLAGS" \
            -DCMAKE_SHARED_LINKER_FLAGS="$BASE_LDFLAGS" \
            -DCMAKE_INSTALL_PREFIX="$STAGE1_INSTALL" \
            -DLLVM_HOST_TRIPLE=aarch64-linux-gnu \
            -DLLVM_DEFAULT_TARGET_TRIPLE=aarch64-linux-gnu \
            -DLLVM_TARGETS_TO_BUILD="AArch64;ARM" \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_OPTIMIZED_TABLEGEN=ON \
            -DLLVM_ENABLE_PIC=ON -DLLVM_ENABLE_ZSTD=ON -DLLVM_ENABLE_ZLIB=ON \
            -DLLVM_PARALLEL_COMPILE_JOBS="$(nproc)" -DLLVM_PARALLEL_LINK_JOBS="$(nproc)" \
            -DLLVM_BUILD_LLVM_DYLIB=ON -DLLVM_LINK_LLVM_DYLIB=ON \
            -DLLVM_INCLUDE_TESTS=OFF -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_ENABLE_BINDINGS=OFF -DLLVM_ENABLE_ASSERTIONS=OFF

      - name: "Stage 1: Build"
        run: |
          cd "$STAGE1_DIR"
          ninja -j"$(nproc)" clang lld llvm-ar llvm-nm llvm-objcopy llvm-objdump \
            llvm-ranlib llvm-readelf llvm-size llvm-strings llvm-strip

      - name: "Stage 1: Install"
        run: |
          cd "$STAGE1_DIR"
          ninja install
          echo "Stage 1 done"

      # ==========================================================
      # PGO Training: run instrumented Clang via QEMU
      # ==========================================================
      - name: "PGO Training (QEMU)"
        if: ${{ inputs.enable_pgo }}
        run: |
          echo 'int main(void) { return 0; }' > /tmp/train.c
          for i in $(seq 1 3); do
            qemu-aarch64-static "$STAGE1_INSTALL/bin/clang" -O2 -c /tmp/train.c -o /tmp/train.o
          done
          echo "PGO profiles collected"

      # ==========================================================
      # STAGE 2: PGO-optimized build (or skip if PGO off)
      # ==========================================================
      - name: "Stage 2: Configure"
        if: ${{ inputs.enable_pgo }}
        run: |
          BUILD_DIR="$GITHUB_WORKSPACE/build"
          INSTALL_DIR="$GITHUB_WORKSPACE/install"
          mkdir -p "$BUILD_DIR" "$INSTALL_DIR"
          echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=$INSTALL_DIR" >> "$GITHUB_ENV"

          OPT_CFLAGS="-O3 -march=armv8-a+crc+crypto -fomit-frame-pointer -ffunction-sections -fdata-sections"
          PGO_DIR="$GITHUB_WORKSPACE/pgo-profiles"
          OPT_LDFLAGS="-Wl,-O3 -Wl,--gc-sections -Wl,--as-needed"

          cmake -S "$LLVM_SOURCE_DIR/llvm" -B "$BUILD_DIR" -G "Ninja" -Wno-dev \
            -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_CROSSCOMPILING=ON \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS_RELEASE="$OPT_CFLAGS -fprofile-use=$PGO_DIR -fprofile-correction" \
            -DCMAKE_CXX_FLAGS_RELEASE="$OPT_CFLAGS -fprofile-use=$PGO_DIR -fprofile-correction" \
            -DCMAKE_EXE_LINKER_FLAGS="$OPT_LDFLAGS" \
            -DCMAKE_SHARED_LINKER_FLAGS="$OPT_LDFLAGS" \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
            -DLLVM_HOST_TRIPLE=aarch64-linux-gnu \
            -DLLVM_DEFAULT_TARGET_TRIPLE=aarch64-linux-gnu \
            -DLLVM_TARGETS_TO_BUILD="AArch64;ARM" \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_ENABLE_RUNTIMES="compiler-rt" \
            -DLLVM_OPTIMIZED_TABLEGEN=ON \
            -DLLVM_ENABLE_PIC=ON -DLLVM_ENABLE_ZSTD=ON -DLLVM_ENABLE_ZLIB=ON \
            -DLLVM_PARALLEL_COMPILE_JOBS="$(nproc)" -DLLVM_PARALLEL_LINK_JOBS="$(nproc)" \
            -DLLVM_BUILD_LLVM_DYLIB=ON -DLLVM_LINK_LLVM_DYLIB=ON \
            -DLLVM_INCLUDE_TESTS=OFF -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_ENABLE_BINDINGS=OFF \
            -DCOMPILER_RT_BUILD_SANITIZERS=ON -DCOMPILER_RT_BUILD_XRAY=ON -DCOMPILER_RT_BUILD_PROFILE=ON \
            -DCOMPILER_RT_BUILD_LIBFUZZER=OFF -DCOMPILER_RT_BUILD_ORC=OFF \
            -DCOMPILER_RT_BUILD_SCUDO_STANDALONE=OFF \
            -DCOMPILER_RT_BUILD_GWP_ASAN=OFF -DCOMPILER_RT_BUILD_MEMPROF=OFF \
            -DLLVM_ENABLE_ASSERTIONS=OFF

      - name: "Stage 2: Build"
        if: ${{ inputs.enable_pgo }}
        run: |
          cd "$BUILD_DIR"
          ninja -j"$(nproc)" clang lld llvm-ar llvm-nm llvm-objcopy llvm-objdump \
            llvm-ranlib llvm-readelf llvm-size llvm-strings llvm-strip

      - name: "Stage 2: Install"
        if: ${{ inputs.enable_pgo }}
        run: |
          cd "$BUILD_DIR"
          ninja install
          echo "Stage 2 PGO toolchain ready"

      # ==========================================================
      # Non-PGO path: use Stage 1 directly
      # ==========================================================
      - name: "Use Stage 1 as final"
        if: ${{ !inputs.enable_pgo }}
        run: |
          echo "BUILD_DIR=$STAGE1_DIR" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=$STAGE1_INSTALL" >> "$GITHUB_ENV"

      # ==========================================================
      # Verify: MUST be ARM64 ELF binaries
      # ==========================================================
      - name: Verify ARM64 ELF binaries
        run: |
          set -euo pipefail
          echo "=== Binary format verification ==="
          file -L "$INSTALL_DIR/bin/clang" "$INSTALL_DIR/bin/lld" "$INSTALL_DIR/bin/llvm-ar"
          if file -L "$INSTALL_DIR/bin/clang" | grep -q "ARM aarch64"; then
            echo "PASS: clang is native ARM64 ELF binary"
          else
            echo "FAIL: clang is NOT ARM64!"
            exit 1
          fi
          du -sh "$INSTALL_DIR"

      - name: Package toolchain
        id: package
        if: ${{ inputs.upload_artifact }}
        run: |
          ARCHIVE_NAME="${{ env.ARTIFACT_NAME }}-${{ env.LLVM_VERSION }}"
          ARCHIVE_PATH="$GITHUB_WORKSPACE/${ARCHIVE_NAME}.tar.xz"
          tar -cJf "$ARCHIVE_PATH" -C "$INSTALL_DIR" .
          echo "archive_path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"
          echo "archive_name=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"
          ls -lh "$ARCHIVE_PATH"

      - name: Upload artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive_name }}
          path: ${{ steps.package.outputs.archive_path }}
          retention-days: 30
          compression-level: 0

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /ccache
          key: ccache-arm64-native-${{ env.LLVM_VERSION }}-${{ github.run_id }}
