name: Build Native ARM64 LLVM/Clang Toolchain

on:
  workflow_dispatch:
    inputs:
      llvm_version:
        description: "LLVM version tag"
        required: false
        default: "llvmorg-19.1.7"
      upload_artifact:
        description: "Upload build artifact"
        required: false
        type: boolean
        default: true

env:
  LLVM_VERSION: ${{ github.event.inputs.llvm_version || 'llvmorg-19.1.7' }}
  ARTIFACT_NAME: llvm-clang-arm64-native

jobs:
  build-llvm:
    name: "Build LLVM ${{ inputs.llvm_version || ''llvmorg-19.1.7'' }} (Native ARM64)"
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup ARM64 cross-build environment
        run: |
          set -euo pipefail
          sudo dpkg --add-architecture arm64
          sudo apt-get update -qq
          sudo apt-get install -y -qq ninja-build cmake ccache python3 flex bison pkg-config xz-utils
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu
          sudo apt-get install -y -qq libc6-dev-arm64-cross libstdc++-14-dev-arm64-cross libgcc-14-dev-arm64-cross linux-libc-dev-arm64-cross
          sudo mkdir -p /ccache
          sudo chown "$(id -u):$(id -g)" /ccache
          ccache --set-config=max_size=20G
          ccache -z
          echo "CCACHE_DIR=/ccache" >> "$GITHUB_ENV"

      - name: Restore ccache
        uses: actions/cache/restore@v4
        id: ccache-restore
        with:
          path: /ccache
          key: ccache-arm64-native-${{ env.LLVM_VERSION }}-${{ github.run_id }}
          restore-keys: ccache-arm64-native-${{ env.LLVM_VERSION }}-

      - name: Clone LLVM project
        run: |
          git clone --depth 1 --branch "$LLVM_VERSION" https://github.com/llvm/llvm-project.git "$GITHUB_WORKSPACE/llvm-project"
          cd "$GITHUB_WORKSPACE/llvm-project"
          echo "LLVM_SOURCE_DIR=$PWD" >> "$GITHUB_ENV"

      # ==========================================================
      # Cross-compile for native ARM64: CMAKE_SYSTEM_PROCESSOR=aarch64
      # ==========================================================
      - name: Configure (native ARM64 cross-build)
        run: |
          set -euo pipefail
          BUILD_DIR="$GITHUB_WORKSPACE/build"
          INSTALL_DIR="$GITHUB_WORKSPACE/install"
          mkdir -p "$BUILD_DIR" "$INSTALL_DIR"
          echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=$INSTALL_DIR" >> "$GITHUB_ENV"

          cmake -S "$LLVM_SOURCE_DIR/llvm" \
            -B "$BUILD_DIR" \
            -G "Ninja" \
            -Wno-dev \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_CROSSCOMPILING=ON \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
            -DLLVM_HOST_TRIPLE=aarch64-linux-gnu \
            -DLLVM_DEFAULT_TARGET_TRIPLE=aarch64-linux-gnu \
            -DLLVM_TARGETS_TO_BUILD="AArch64;ARM" \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_ENABLE_RUNTIMES="compiler-rt" \
            -DLLVM_ENABLE_PIC=ON \
            -DLLVM_ENABLE_ZSTD=ON \
            -DLLVM_ENABLE_ZLIB=ON \
            -DLLVM_ENABLE_TERMINFO=ON \
            -DLLVM_PARALLEL_COMPILE_JOBS="$(nproc)" \
            -DLLVM_PARALLEL_LINK_JOBS="$(nproc)" \
            -DLLVM_BUILD_LLVM_DYLIB=ON \
            -DLLVM_LINK_LLVM_DYLIB=ON \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_ENABLE_BINDINGS=OFF \
            -DCOMPILER_RT_BUILD_SANITIZERS=ON \
            -DCOMPILER_RT_BUILD_XRAY=ON \
            -DCOMPILER_RT_BUILD_PROFILE=ON \
            -DLLVM_ENABLE_ASSERTIONS=OFF

      - name: Build LLVM/Clang (native ARM64)
        run: |
          set -euo pipefail
          cd "$BUILD_DIR"
          ninja -j"$(nproc)" \
            clang lld \
            llvm-ar llvm-nm llvm-objcopy llvm-objdump \
            llvm-ranlib llvm-readelf llvm-size llvm-strings llvm-strip

      - name: Install toolchain
        run: |
          set -euo pipefail
          cd "$BUILD_DIR"
          ninja install
          cd "$INSTALL_DIR/bin"
          ln -sf clang clang++ || true
          echo "Native ARM64 toolchain installed to: $INSTALL_DIR"

      # ==========================================================
      # Verify: MUST be ARM64 ELF binaries
      # ==========================================================
      - name: Verify ARM64 ELF binaries
        run: |
          set -euo pipefail
          echo "=== Binary format verification ==="
          file "$INSTALL_DIR/bin/clang" "$INSTALL_DIR/bin/lld" "$INSTALL_DIR/bin/llvm-ar"
          if file "$INSTALL_DIR/bin/clang" | grep -q "ARM aarch64"; then
            echo "PASS: clang is native ARM64 ELF binary"
          else
            echo "FAIL: clang is NOT ARM64!"
            exit 1
          fi
          du -sh "$INSTALL_DIR"

      - name: Package toolchain
        id: package
        if: ${{ inputs.upload_artifact }}
        run: |
          ARCHIVE_NAME="${{ env.ARTIFACT_NAME }}-${{ env.LLVM_VERSION }}"
          ARCHIVE_PATH="$GITHUB_WORKSPACE/${ARCHIVE_NAME}.tar.xz"
          tar -cJf "$ARCHIVE_PATH" -C "$INSTALL_DIR" .
          echo "archive_path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"
          echo "archive_name=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"
          ls -lh "$ARCHIVE_PATH"

      - name: Upload artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive_name }}
          path: ${{ steps.package.outputs.archive_path }}
          retention-days: 30
          compression-level: 0

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /ccache
          key: ccache-arm64-native-${{ env.LLVM_VERSION }}-${{ github.run_id }}
