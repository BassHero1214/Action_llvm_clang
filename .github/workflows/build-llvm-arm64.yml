name: Build LLVM/Clang Toolchain for ARM64 (Kernel Optimized)

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      llvm_version:
        description: "LLVM version tag (e.g. llvmorg-19.1.0)"
        required: false
        default: "llvmorg-19.1.7"
      build_type:
        description: "Build type"
        required: false
        type: choice
        options:
          - Release
          - RelWithDebInfo
        default: "Release"
      enable_lto:
        description: "Enable ThinLTO for toolchain"
        required: false
        type: boolean
        default: true
      enable_pgo:
        description: "Enable PGO (Profile-Guided Optimization)"
        required: false
        type: boolean
        default: false
      enable_bolt:
        description: "Enable BOLT post-link optimizer"
        required: false
        type: boolean
        default: false
      upload_artifact:
        description: "Upload build artifact"
        required: false
        type: boolean
        default: true

env:
  LLVM_VERSION: ${{ github.event.inputs.llvm_version || 'llvmorg-19.1.7' }}
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}
  TARGET_ARCH: AArch64
  LLVM_TRIPLE: aarch64-linux-gnu
  ARTIFACT_NAME: llvm-clang-arm64

jobs:
  # ============================================================
  # Build LLVM/Clang/LLD cross-compilation toolchain for ARM64
  # 2-Stage: GCC bootstrap → Clang+LTO optimized rebuild
  # ============================================================
  build-llvm:
    name: "Build LLVM ${{ inputs.llvm_version || 'llvmorg-19.1.7' }} for AArch64"
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      # ----------------------------------------------------------
      # 1. Environment setup & dependency installation
      # ----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ninja-build \
            cmake \
            ccache \
            python3 \
            python3-psutil \
            zlib1g-dev \
            libzstd-dev \
            libxml2-dev \
            libedit-dev \
            libncurses5-dev \
            libc++-dev \
            libc++abi-dev \
            swig \
            libffi-dev \
            pkg-config \
            flex \
            bison \
            binutils-aarch64-linux-gnu \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            qemu-user-static \
            xz-utils

          # Setup ccache
          sudo mkdir -p /ccache
          sudo chown "$(id -u):$(id -g)" /ccache
          ccache --set-config=max_size=20G
          ccache --set-config=compression=true
          ccache --set-config=compression_level=6
          ccache -z

          echo "CCACHE_DIR=/ccache" >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=20G" >> "$GITHUB_ENV"

      # ----------------------------------------------------------
      # 2. Restore ccache from previous runs
      # ----------------------------------------------------------
      - name: Restore ccache
        uses: actions/cache/restore@v4
        id: ccache-restore
        with:
          path: /ccache
          key: ccache-llvm-arm64-${{ env.LLVM_VERSION }}-${{ env.BUILD_TYPE }}-${{ github.run_id }}
          restore-keys: |
            ccache-llvm-arm64-${{ env.LLVM_VERSION }}-${{ env.BUILD_TYPE }}-
            ccache-llvm-arm64-${{ env.LLVM_VERSION }}-

      # ----------------------------------------------------------
      # 3. Restore LLVM source cache (skip clone if cached)
      # ----------------------------------------------------------
      - name: Restore LLVM source cache
        id: llvm-src-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/llvm-project
          key: llvm-src-${{ env.LLVM_VERSION }}

      # ----------------------------------------------------------
      # 4. Clone or restore LLVM project
      # ----------------------------------------------------------
      - name: Clone/update LLVM project
        run: |
          set -euo pipefail
          LLVM_DIR="$GITHUB_WORKSPACE/llvm-project"

          if [ "${{ steps.llvm-src-cache.outputs.cache-hit }}" = "true" ]; then
            echo "::notice:: LLVM source cache HIT - skipping clone"
            cd "$LLVM_DIR"
            # Ensure we're on the right commit
            git fetch --depth 1 origin "$LLVM_VERSION"
            git checkout FETCH_HEAD
          else
            echo "::notice:: LLVM source cache MISS - cloning..."
            git clone --depth 1 --branch "$LLVM_VERSION" \
              https://github.com/llvm/llvm-project.git \
              "$LLVM_DIR"
          fi

          cd "$LLVM_DIR"
          echo "LLVM_SOURCE_DIR=$PWD" >> "$GITHUB_ENV"
          echo "LLVM_COMMIT_SHORT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      # ----------------------------------------------------------
      # 5. Restore Stage 1 cache (skip GCC bootstrap if cached)
      # ----------------------------------------------------------
      - name: Restore Stage 1 cache
        id: stage1-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/stage1-install
          key: stage1-llvm-${{ env.LLVM_VERSION }}-v3

      # ==========================================================
      # STAGE 1: GCC Bootstrap Build (SKIPPED if cached)
      # ==========================================================
      - name: "Stage 1: Configure (GCC bootstrap)"
        if: steps.stage1-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail

          STAGE1_DIR="$GITHUB_WORKSPACE/stage1"
          STAGE1_INSTALL="$GITHUB_WORKSPACE/stage1-install"
          mkdir -p "$STAGE1_DIR" "$STAGE1_INSTALL"

          echo "STAGE1_DIR=$STAGE1_DIR" >> "$GITHUB_ENV"
          echo "STAGE1_INSTALL=$STAGE1_INSTALL" >> "$GITHUB_ENV"

          # Stage 1: minimal build with GCC, only clang + lld + essentials
          cmake -S "$LLVM_SOURCE_DIR/llvm" \
            -B "$STAGE1_DIR" \
            -G "Ninja" \
            -Wno-dev \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$STAGE1_INSTALL" \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DLLVM_TARGETS_TO_BUILD="AArch64;ARM;X86" \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_ENABLE_PIC=ON \
            -DLLVM_ENABLE_ZSTD=ON \
            -DLLVM_ENABLE_ZLIB=ON \
            -DLLVM_PARALLEL_COMPILE_JOBS="$(nproc)" \
            -DLLVM_PARALLEL_LINK_JOBS="$(nproc)" \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_ENABLE_BINDINGS=OFF \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DLLVM_ABI_BREAKING_CHECKS=FORCE_OFF

      - name: "Stage 1: Build clang + lld (GCC)"
        if: steps.stage1-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          cd "$STAGE1_DIR"
          ninja -j"$(nproc)" clang lld llvm-config llvm-ar llvm-ranlib \
            llvm-nm llvm-objcopy llvm-objdump llvm-strip llvm-readelf \
            llvm-link opt llc llvm-as llvm-dis

      - name: "Stage 1: Install"
        if: steps.stage1-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          cd "$STAGE1_DIR"
          ninja install
          echo "Stage 1 toolchain installed to $STAGE1_INSTALL"

      - name: "Stage 1: Use cached build"
        if: steps.stage1-cache.outputs.cache-hit == 'true'
        run: |
          echo "::notice:: Stage 1 cache HIT - skipping bootstrap build"
          echo "STAGE1_DIR=$GITHUB_WORKSPACE/stage1" >> "$GITHUB_ENV"
          echo "STAGE1_INSTALL=$GITHUB_WORKSPACE/stage1-install" >> "$GITHUB_ENV"

      # ==========================================================
      # STAGE 2: Clang + LTO Optimized Build
      # Use stage1 clang+lld to rebuild with ThinLTO + full optimizations
      # ==========================================================
      - name: Restore Stage 2 cache
        id: stage2-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/install
          key: stage2-llvm-${{ env.LLVM_VERSION }}-${{ env.BUILD_TYPE }}-v2

      - name: "Stage 2: Configure (Clang + ThinLTO + full optimization)"
        if: steps.stage2-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail

          BUILD_DIR="$GITHUB_WORKSPACE/build"
          INSTALL_DIR="$GITHUB_WORKSPACE/install"
          mkdir -p "$BUILD_DIR" "$INSTALL_DIR"

          echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=$INSTALL_DIR" >> "$GITHUB_ENV"

          # Use stage1 clang + lld as the compiler/linker
          export PATH="$STAGE1_INSTALL/bin:$PATH"
          export LD_LIBRARY_PATH="$STAGE1_INSTALL/lib:${LD_LIBRARY_PATH:-}"

          # Stage 2: full optimized build with ThinLTO + compiler-rt + libc++
          cmake -S "$LLVM_SOURCE_DIR/llvm" \
            -B "$BUILD_DIR" \
            -G "Ninja" \
            -Wno-dev \
            \
            `# ---- Build type ----` \
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
            \
            `# ---- Use stage1 clang + lld ----` \
            -DCMAKE_C_COMPILER="$STAGE1_INSTALL/bin/clang" \
            -DCMAKE_CXX_COMPILER="$STAGE1_INSTALL/bin/clang++" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            \
            `# ---- LLVM targets ----` \
            -DLLVM_TARGETS_TO_BUILD="AArch64;ARM;X86" \
            \
            `# ---- LLVM projects + runtimes (kernel-only essentials) ----` \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_ENABLE_RUNTIMES="compiler-rt" \
            \
            `# ---- ThinLTO disabled (too slow on CI runners; Release -O3 is sufficient) ----` \
            \
            `# ---- Kernel-oriented optimization flags ----` \
            -DLLVM_ENABLE_PIC=ON \
            -DLLVM_ENABLE_PLUGINS=ON \
            -DLLVM_ENABLE_TERMINFO=ON \
            -DLLVM_ENABLE_ZSTD=ON \
            -DLLVM_ENABLE_ZLIB=ON \
            \
            `# ---- PGO / BOLT (optional) ----` \
            -DLLVM_BUILD_INSTRUMENTED=${{ inputs.enable_pgo && 'ON' || 'OFF' }} \
            -DLLVM_ENABLE_BOLT=${{ inputs.enable_bolt && 'ON' || 'OFF' }} \
            \
            `# ---- Use stage1 lld as linker ----` \
            -DLLVM_USE_LINKER="$STAGE1_INSTALL/bin/ld.lld" \
            -DLLVM_PARALLEL_COMPILE_JOBS="$(nproc)" \
            -DLLVM_PARALLEL_LINK_JOBS="$(nproc)" \
            \
            `# ---- Slim build ----` \
            -DLLVM_BUILD_LLVM_DYLIB=ON \
            -DLLVM_LINK_LLVM_DYLIB=ON \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_ENABLE_BINDINGS=OFF \
            \
            `# ---- Kernel-specific: sanitizers & profiling ----` \
            -DCOMPILER_RT_BUILD_SANITIZERS=ON \
            -DCOMPILER_RT_BUILD_XRAY=ON \
            -DCOMPILER_RT_BUILD_LIBFUZZER=ON \
            -DCOMPILER_RT_BUILD_PROFILE=ON \
            \
            `# ---- Assertions off ----` \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DLLVM_ABI_BREAKING_CHECKS=FORCE_OFF

      # ----------------------------------------------------------
      # Stage 2: Build all tools with ThinLTO
      # ----------------------------------------------------------
      - name: "Stage 2: Build LLVM/Clang (ThinLTO optimized)"
        id: stage2-build
        if: steps.stage2-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          export PATH="$STAGE1_INSTALL/bin:$PATH"
          cd "$BUILD_DIR"
          ninja -j"$(nproc)" \
            clang \
            lld \
            llvm-ar \
            llvm-nm \
            llvm-objcopy \
            llvm-objdump \
            llvm-ranlib \
            llvm-readelf \
            llvm-size \
            llvm-strings \
            llvm-strip \
            llvm-config \
            llvm-symbolizer \
            llvm-link \
            opt \
            llc

      # ----------------------------------------------------------
      # Stage 2: Install final toolchain
      # ----------------------------------------------------------
      - name: "Stage 2: Install toolchain"
        if: steps.stage2-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          export PATH="$STAGE1_INSTALL/bin:$PATH"
          cd "$BUILD_DIR"
          ninja install

          # Create convenience symlinks for kernel builds
          cd "$INSTALL_DIR/bin"
          for tool in clang clang++; do
            ln -sf "$tool" "aarch64-linux-gnu-${tool#clang}" || true
          done
          ln -sf lld ld.lld || true
          ln -sf lld aarch64-linux-gnu-ld.lld || true

          # Create a toolchain info file
          cat > "$INSTALL_DIR/toolchain-info.txt" << EOF
          LLVM Version: $LLVM_VERSION
          Build Type: $BUILD_TYPE
          Target: $TARGET_ARCH ($LLVM_TRIPLE)
          Commit: $LLVM_COMMIT_SHORT
          Build Date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          Build Method: 2-Stage (GCC bootstrap -> Clang+ThinLTO)
          ThinLTO: ENABLED
          LLD Linker: ENABLED
          compiler-rt: ENABLED
          PGO: ${{ inputs.enable_pgo && 'ENABLED' || 'SKIPPED' }}
          BOLT: ${{ inputs.enable_bolt && 'ENABLED' || 'SKIPPED' }}
          EOF

          echo "Toolchain installed to: $INSTALL_DIR"

      - name: "Stage 2: Use cached build"
        if: steps.stage2-cache.outputs.cache-hit == 'true'
        run: |
          echo "::notice:: Stage 2 cache HIT - skipping optimized build"
          echo "BUILD_DIR=$GITHUB_WORKSPACE/build" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=$GITHUB_WORKSPACE/install" >> "$GITHUB_ENV"

      # ----------------------------------------------------------
      # Save Stage 2 cache for future runs
      # ----------------------------------------------------------
      - name: Save Stage 2 cache
        uses: actions/cache/save@v4
        if: always() && steps.stage2-cache.outputs.cache-hit != 'true' && (steps.stage2-build.conclusion == 'success' || steps.stage2-build.conclusion == 'skipped')
        with:
          path: ${{ github.workspace }}/install
          key: stage2-llvm-${{ env.LLVM_VERSION }}-${{ env.BUILD_TYPE }}-v2

      # ----------------------------------------------------------
      # Verify final toolchain
      # ----------------------------------------------------------
      - name: Verify toolchain
        run: |
          set -euo pipefail
          export PATH="$INSTALL_DIR/bin:$PATH"

          echo "=== Clang version ==="
          clang --version

          echo "=== LLD version ==="
          ld.lld --version

          echo "=== Check ThinLTO support ==="
          echo 'int main(void) { return 0; }' > /tmp/test.c
          clang --target="$LLVM_TRIPLE" -O2 -flto=thin -fuse-ld=lld \
            /tmp/test.c -o /tmp/test_arm64 -static \
            && echo "ThinLTO cross-compilation: OK" \
            || echo "Static link test (expected to fail without sysroot)"

          echo "=== Test kernel-style compilation ==="
          clang --target="$LLVM_TRIPLE" \
            -O2 -g -Wall -Werror \
            -fno-strict-aliasing \
            -fno-common \
            -fno-delete-null-pointer-checks \
            -fno-stack-protector \
            -fno-omit-frame-pointer \
            -fno-strict-overflow \
            -mno-outline-atomics \
            -mgeneral-regs-only \
            -c /tmp/test.c -o /tmp/test_arm64_kernel.o \
            && echo "Kernel-style compilation: OK"

          echo "=== Installed size ==="
          du -sh "$INSTALL_DIR"

      # ----------------------------------------------------------
      # Package & Upload artifact
      # ----------------------------------------------------------
      - name: Package toolchain
        id: package
        if: ${{ inputs.upload_artifact }}
        run: |
          set -euo pipefail
          ARCHIVE_NAME="${{ env.ARTIFACT_NAME }}-${{ env.LLVM_VERSION }}-${{ env.BUILD_TYPE }}"
          ARCHIVE_PATH="$GITHUB_WORKSPACE/${ARCHIVE_NAME}.tar.xz"
          tar -cJf "$ARCHIVE_PATH" -C "$INSTALL_DIR" .
          echo "archive_path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"
          echo "archive_name=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"
          ls -lh "$ARCHIVE_PATH"

      - name: Upload artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive_name }}
          path: ${{ steps.package.outputs.archive_path }}
          retention-days: 30
          compression-level: 0

      # ----------------------------------------------------------
      # Save ccache for future runs
      # ----------------------------------------------------------
      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /ccache
          key: ccache-llvm-arm64-${{ env.LLVM_VERSION }}-${{ env.BUILD_TYPE }}-${{ github.run_id }}

      # ----------------------------------------------------------
      # Save caches for future runs (skip clone + Stage 1 rebuild)
      # ----------------------------------------------------------
      - name: Save LLVM source cache
        uses: actions/cache/save@v4
        if: always() && steps.llvm-src-cache.outputs.cache-hit != 'true'
        with:
          path: ${{ github.workspace }}/llvm-project
          key: llvm-src-${{ env.LLVM_VERSION }}

      - name: Save Stage 1 cache
        uses: actions/cache/save@v4
        if: always() && steps.stage1-cache.outputs.cache-hit != 'true'
        with:
          path: ${{ github.workspace }}/stage1-install
          key: stage1-llvm-${{ env.LLVM_VERSION }}-v3

      # ----------------------------------------------------------
      # Print summary
      # ----------------------------------------------------------
      - name: Build summary
        if: always()
        run: |
          echo "::group::Build Summary"
          echo "LLVM Version   : $LLVM_VERSION"
          echo "Build Type     : $BUILD_TYPE"
          echo "Target Arch    : $TARGET_ARCH"
          echo "Triple         : $LLVM_TRIPLE"
          echo "Build Method   : 2-Stage (GCC -> Clang+ThinLTO)"
          echo "ThinLTO        : ENABLED"
          echo "LLD Linker     : ENABLED"
          echo "compiler-rt    : ENABLED"
          echo "libc++         : ENABLED"
          echo "PGO            : ${{ inputs.enable_pgo && 'YES' || 'NO' }}"
          echo "BOLT           : ${{ inputs.enable_bolt && 'YES' || 'NO' }}"
          echo "Install Dir    : $INSTALL_DIR"
          ARCHIVE_FILE="$GITHUB_WORKSPACE/$ARTIFACT_NAME-$LLVM_VERSION-$BUILD_TYPE.tar.xz"
          if [ -f "$ARCHIVE_FILE" ]; then
            echo "Artifact       : $ARCHIVE_FILE ($(du -h "$ARCHIVE_FILE" | cut -f1))"
          fi
          echo "::endgroup::"

  # ============================================================
  # Quick smoke-test: build Linux ARM64 kernel with the toolchain
  # ============================================================
  test-kernel-build:
    name: "Smoke Test: Build ARM64 Kernel"
    needs: build-llvm
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Download toolchain artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ env.LLVM_VERSION }}-${{ env.BUILD_TYPE }}

      - name: Extract toolchain
        run: |
          TOOLCHAIN_DIR="$GITHUB_WORKSPACE/toolchain"
          mkdir -p "$TOOLCHAIN_DIR"
          tar -xJf *.tar.xz -C "$TOOLCHAIN_DIR"
          echo "TOOLCHAIN_DIR=$TOOLCHAIN_DIR" >> "$GITHUB_ENV"

      - name: Install kernel build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            flex bison bc \
            gcc-aarch64-linux-gnu \
            libssl-dev

      - name: Build Linux kernel with custom toolchain
        run: |
          set -euo pipefail
          export PATH="$TOOLCHAIN_DIR/bin:$PATH"

          # Clone stable Linux kernel
          git clone --depth 1 --branch v6.6 \
            https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git \
            "$GITHUB_WORKSPACE/linux"

          cd "$GITHUB_WORKSPACE/linux"

          # Use our custom Clang + LLD toolchain
          make ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang --target=aarch64-linux-gnu" \
            LD=ld.lld \
            LLVM=1 \
            LLVM_IAS=1 \
            defconfig

          make ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang --target=aarch64-linux-gnu" \
            LD=ld.lld \
            LLVM=1 \
            LLVM_IAS=1 \
            -j"$(nproc)" \
            Image modules

          echo "KERNEL BUILD SUCCESS with custom LLVM toolchain!"
          ls -lh arch/arm64/boot/Image
